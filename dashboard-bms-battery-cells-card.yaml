# BMS Battery Cells Card für die Integration "Battery Emulator"
# -----------------------------------------------------------------
# 1) Entitäts-IDs in HA prüfen: Entwicklerwerkzeuge → Zustände → nach "cell_" filtern.
#    Abweichender Gerätename → Prefix nicht "battery_emulator"? Dann alle entity:-Zeilen anpassen.
# 2) Weniger/mehr Zellen: Einträge unter "cells:" von unten kürzen oder fortlaufend ergänzen.
# 3) In der UI: Dashboard bearbeiten → Karte hinzufügen → YAML manuell einfügen (oder Raw-Konfiguration).
# 4) Detailansicht: total_voltage_entity, total_current_entity, soh_entity sind Pflicht für Pack-Spannung,
#    Strom und SoH (siehe Karten-Editor). SoH bleibt „--“, wenn der BMS keinen Wert liefert.

